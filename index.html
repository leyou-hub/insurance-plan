let data = JSON.parse(JSON.stringify(templates['pingan-group'].defaults));
let currentTemplate = 'pingan-group';

// ==================== 初始化 ====================
function init() {
  document.getElementById('templateSelect').addEventListener('change', switchTemplate);
  document.getElementById('editForm').addEventListener('input', function(e) { if (e.target.dataset.field) { syncField(e.target); renderPreview(); } });
  document.getElementById('editForm').addEventListener('change', function(e) { if (e.target.dataset.field) { syncField(e.target); renderPreview(); } });
  document.getElementById('sectionNav').addEventListener('click', function(e) {
    const btn = e.target.closest('.nav-btn');
    if (!btn) return;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  document.getElementById('editPane').addEventListener('scroll', updateNavHighlight);
  setTodayDate();
  renderForm();
  renderPreview();
}

function setTodayDate() {
  const now = new Date();
  const ymd = now.getFullYear() + '年' + String(now.getMonth()+1).padStart(2,'0') + '月' + String(now.getDate()).padStart(2,'0') + '日';
  data.genDate = ymd;
}

function syncField(el) {
  const path = el.dataset.field.split('.');
  let obj = data;
  for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
  if (el.type === 'checkbox') obj[path[path.length-1]] = el.checked;
  else obj[path[path.length-1]] = el.value;
  // 同步数组内嵌套对象
  syncArrayData();
}

function syncArrayData() {
  // 保障项目
  data.coverageItems.forEach((_, i) => {
    ['name','limit','unit'].forEach(f => {
      const el = document.querySelector(`[data-field="coverageItems.${i}.${f}"]`);
      if (el) data.coverageItems[i][f] = el.value;
    });
  });
  // 人员测算
  data.staffList.forEach((_, i) => {
    ['occupation','count','perPremium'].forEach(f => {
      const el = document.querySelector(`[data-field="staffList.${i}.${f}"]`);
      if (el) data.staffList[i][f] = el.value;
    });
  });
  // 特别约定
  data.specialTerms.forEach((_, i) => {
    const el = document.querySelector(`[data-field="specialTerms.${i}"]`);
    if (el) data.specialTerms[i] = el.value;
  });
  // 使用说明
  data.usageNotes.forEach((_, i) => {
    const el = document.querySelector(`[data-field="usageNotes.${i}"]`);
    if (el) data.usageNotes[i] = el.value;
  });
  // 附件
  data.attachments.forEach((_, i) => {
    ['name','url'].forEach(f => {
      const el = document.querySelector(`[data-field="attachments.${i}.${f}"]`);
      if (el) data.attachments[i][f] = el.value;
    });
  });
  // 自动计算总人数和总保费
  calcTotals();
}

function calcTotals() {
  const totalStaff = data.staffList.reduce((s, r) => s + (parseInt(r.count) || 0), 0);
  const totalPremium = data.staffList.reduce((s, r) => s + (parseFloat(r.perPremium) || 0) * (parseInt(r.count) || 0), 0);
  data.insuredCount = String(totalStaff);
  data.totalPremium = totalPremium.toFixed(2);
  // 同步更新表单显示
  const staffEl = document.querySelector('[data-field="insuredCount"]');
  if (staffEl) staffEl.value = data.insuredCount;
  const premiumEl = document.querySelector('[data-field="totalPremium"]');
  if (premiumEl) premiumEl.value = data.totalPremium;
}

function f(label, fieldPath, type, readonly) {
  const val = fieldPath.split('.').reduce((o,k) => o[k], data);
  const ro = readonly ? 'readonly tabindex="-1"' : '';
  const style = readonly ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : '';
  return `<label class="block"><span class="text-xs text-gray-400">${label}${readonly?' <span class="text-blue-500">(自动计算)</span>':''}</span><input type="${type}" value="${esc(String(val??''))}" data-field="${fieldPath}" ${ro} class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 mt-0.5 ${style}"></label>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

      <div class="p-8">
        <h3 class="text-lg font-bold text-gray-800 mb-4">重点阅读</h3>
        <h4 class="text-base font-bold text-gray-700 mb-3">特别约定</h4>
        <p class="text-xs text-gray-400 mb-4">以下内容来自产品配置，请在投保前重点确认条款说明与特别约定。</p>
        <div class="space-y-2 text-sm">
          ${d.specialTerms.map((t, i) => `
            <div class="flex items-start gap-2">
              <span class="text-primary font-bold shrink-0">${i+1}、</span>
              <span class="text-gray-700 leading-relaxed">${esc(t)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- ===== 最后一页：资料留存 / 附件下载 ===== -->
    ${d.attachments.length > 0 ? `
    <div class="print-break">
      <div class="plan-header-bar text-white px-6 py-3 flex items-center gap-2">
        <i class="fa ${t.icon}"></i>
        <span class="text-sm font-bold">${esc(t.planName)}</span>
        <span class="text-xs opacity-70 ml-auto">${esc(d.insurer)} · 投保计划书 · ${esc(d.genDate)}</span>
      </div>
      <div class="p-8">
        <h3 class="text-lg font-bold text-gray-800 mb-4">资料留存</h3>
        <h4 class="text-base font-bold text-gray-700 mb-3">保险条款下载</h4>
        <p class="text-xs text-gray-400 mb-4">条款及附件可通过下列链接打开，建议另行下载留存。</p>
        <table class="data-table w-full text-sm">
          <thead>
            <tr><th>资料名称</th><th>链接地址</th></tr>
          </thead>
          <tbody>
            ${d.attachments.map(a => `
              <tr>
                <td>${esc(a.name)}</td>
                <td class="text-xs text-primary break-all">${esc(a.url)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}
  `;

  document.getElementById('previewContent').innerHTML = html;
}

// ==================== 辅助 ====================
function scrollToSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function updateNavHighlight() {
  const sections = document.querySelectorAll('.form-section');
  const btns = document.querySelectorAll('.nav-btn');
  let cur = null;
  sections.forEach(s => { if (s.getBoundingClientRect().top < 200) cur = s.id; });
  btns.forEach(b => b.classList.toggle('active', b.dataset.target === cur));
}

init();
</script>
</body>
</html>
